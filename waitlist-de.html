<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Warteliste | Vecta</title>
    <meta
      name="description"
      content="Trag dich mit Name und E-Mail in die Vecta-Warteliste ein."
    />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <script src="theme-switch.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="ambient ambient-one"></div>
    <div class="ambient ambient-two"></div>

    <header class="site-header-shell">
      <div class="site-header container">
        <a class="brand" href="index-de.html" aria-label="Vecta Startseite">
          <span class="brand-mark" aria-hidden="true">
            <img src="logo.svg" alt="" class="brand-logo" />
          </span>
        </a>
        <nav class="site-nav" aria-label="Hauptnavigation">
          <a href="index-de.html#progress">Fortschritt</a>
          <a href="index-de.html#why-vecta">Warum Vecta</a>
          <a href="index-de.html#vision">Vision</a>
        </nav>
        <div class="header-controls">
          <div class="lang-toggle">
            <select class="lang-select" aria-label="Sprache" title="Sprache">
              <option value="waitlist.html">English</option>
              <option value="waitlist-de.html" selected>Deutsch</option>
            </select>
          </div>
          <button
            class="theme-toggle"
            type="button"
            aria-pressed="false"
            data-theme-toggle
            data-light-label="Hell"
            data-dark-label="Dunkel"
            data-aria-light="Zum hellen Modus wechseln"
            data-aria-dark="Zum dunklen Modus wechseln"
          >
            <span class="theme-toggle-track" aria-hidden="true">
              <span class="theme-toggle-thumb"></span>
            </span>
            <span class="theme-toggle-text" data-theme-toggle-label>Hell</span>
          </button>
          <a class="header-cta" href="index-de.html">Zur Startseite</a>
        </div>
      </div>
    </header>

    <main class="waitlist-page container reveal">
      <article class="waitlist-only-card">
        <div class="waitlist-only-layout">
          <section class="waitlist-only-content">
            <p class="waitlist-kicker">Frueher Zugang</p>
            <h1>Trag dich in die Vecta-Warteliste ein.</h1>
            <p>
              Gib deinen Namen und deine E-Mail ein, um beim Launch sofort dabei
              zu sein.
            </p>

            <form
              id="waitlist-form"
              class="waitlist-form"
              novalidate
              data-success="Du stehst auf der Warteliste. Wir melden uns per E-Mail."
              data-error="Bitte gib einen gueltigen Namen und eine gueltige E-Mail ein."
              data-remote-error="Die Anmeldung ist noch nicht verbunden. Bitte die Google Apps Script Bereitstellung abschliessen."
              data-loading="Deine Anmeldung wird gesendet..."
              data-loading-button="Wird gesendet..."
            >
              <label class="field-group">
                <span>Name</span>
                <input
                  type="text"
                  name="name"
                  autocomplete="name"
                  placeholder="Alex Morgan"
                  required
                />
              </label>
              <label class="field-group">
                <span>E-Mail</span>
                <input
                  type="email"
                  name="email"
                  autocomplete="email"
                  placeholder="alex@example.com"
                  required
                />
              </label>
              <button type="submit" class="waitlist-btn">Warteliste beitreten</button>
            </form>
            <div
              id="waitlist-progress"
              class="waitlist-progress"
              aria-hidden="true"
            >
              <span class="waitlist-progress-bar"></span>
            </div>
            <p id="waitlist-message" class="waitlist-message" aria-live="polite"></p>
          </section>

          <aside class="waitlist-phone-wrap" aria-hidden="true">
            <div class="waitlist-phone">
              <img
                src="screen-home.png"
                alt=""
                data-theme-image
                data-light-src="screen-home.png"
                data-dark-src="screen-home-dark.svg"
              />
            </div>
          </aside>
        </div>
      </article>
    </main>

    <script src="language-switch.js"></script>
    <script>
      (function () {
        const form = document.getElementById("waitlist-form");
        const message = document.getElementById("waitlist-message");
        const progress = document.getElementById("waitlist-progress");
        const submitButton = form ? form.querySelector(".waitlist-btn") : null;
        const WAITLIST_ENDPOINT =
          "https://script.google.com/macros/s/AKfycbxmElKR7VeXZjeyqgShERK5TgEAsx4_urqyZaHBWtoBIobFFCQYGoKWHWKFpdqAfEuP/exec";

        if (!form || !message || !progress || !submitButton) return;

        const defaultButtonLabel = submitButton.textContent;

        function setMessageState(type, text) {
          message.textContent = text;
          message.classList.remove("success", "error", "pending");

          if (type) {
            message.classList.add(type);
          }
        }

        function setSubmitting(isSubmitting) {
          form.classList.toggle("is-submitting", isSubmitting);
          form.setAttribute("aria-busy", isSubmitting ? "true" : "false");
          progress.classList.toggle("is-visible", isSubmitting);
          submitButton.textContent = isSubmitting
            ? form.dataset.loadingButton
            : defaultButtonLabel;

          Array.prototype.forEach.call(
            form.querySelectorAll("input, button"),
            function (field) {
              field.disabled = isSubmitting;
            }
          );
        }

        form.addEventListener("submit", async function (event) {
          event.preventDefault();
          const name = form.elements.name.value.trim();
          const email = form.elements.email.value.trim();
          const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

          setSubmitting(false);

          if (!name || !emailPattern.test(email)) {
            setMessageState("error", form.dataset.error);
            return;
          }

          if (WAITLIST_ENDPOINT.includes("REPLACE_WITH_DEPLOYED_WEB_APP_ID")) {
            setMessageState("error", form.dataset.remoteError);
            return;
          }

          setSubmitting(true);
          setMessageState("pending", form.dataset.loading);

          try {
            await fetch(WAITLIST_ENDPOINT, {
              method: "POST",
              mode: "no-cors",
              headers: {
                "Content-Type": "text/plain;charset=utf-8",
              },
              body: JSON.stringify({
                name: name,
                email: email,
                locale: "de",
                source: "waitlist-de.html",
                userAgent: navigator.userAgent,
              }),
            });

            form.reset();
            setMessageState("success", form.dataset.success);
          } catch (_error) {
            setMessageState("error", form.dataset.remoteError);
          } finally {
            setSubmitting(false);
          }
        });
      })();
    </script>
  </body>
</html>
